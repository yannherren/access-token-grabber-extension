<!--Demo page generated with claude -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App - Access Token Grabber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .logo h1 {
            font-size: 24px;
            color: #1a1a2e;
            font-weight: 600;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Login Form */
        #login-section .form-group {
            margin-bottom: 20px;
        }

        #login-section label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        #login-section input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
        }

        #login-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Dashboard */
        #dashboard-section {
            display: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .user-details {
            color: white;
        }

        .user-details h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .user-details p {
            font-size: 13px;
            opacity: 0.85;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .stat-card .label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .activity {
            background: #f8fafc;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .activity h4 {
            font-size: 14px;
            color: #374151;
            margin-bottom: 12px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .activity-text {
            font-size: 13px;
            color: #6b7280;
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hint box */
        .hint-box {
            margin-top: 25px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 10px;
            border-left: 4px solid #f59e0b;
        }

        .hint-box p {
            font-size: 13px;
            color: #92400e;
            line-height: 1.5;
        }

        .hint-box strong {
            color: #78350f;
        }

        /* Credentials hint */
        .credentials {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 8px;
            font-size: 13px;
            color: #166534;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h1>SecureApp Demo</h1>
            <p>Access Token Grabber Demo</p>
        </div>

        <div id="login-section">
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" value="demo@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" value="demo123" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    Sign In
                </button>
            </form>
        </div>

        <div id="dashboard-section">
            <div class="user-info">
                <div class="avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="user-details">
                    <h3 id="user-name">Demo User</h3>
                    <p id="user-email">demo@example.com</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value">127</div>
                    <div class="label">API Calls</div>
                </div>
                <div class="stat-card">
                    <div class="value">99.9%</div>
                    <div class="label">Uptime</div>
                </div>
                <div class="stat-card">
                    <div class="value">3</div>
                    <div class="label">Projects</div>
                </div>
                <div class="stat-card">
                    <div class="value">Pro</div>
                    <div class="label">Plan</div>
                </div>
            </div>
            <button class="btn btn-secondary" id="logout-btn">
                Sign Out
            </button>

        </div>
    </div>
</div>

<script>
    function generateFakeJWT() {
        const header = {
            alg: "RS256",
            typ: "JWT"
        };

        const payload = {
            sub: "user_" + Math.random().toString(36).substr(2, 9),
            email: document.getElementById('email').value,
            name: "Demo User",
            iat: Math.floor(Date.now() / 1000),
            exp: Math.floor(Date.now() / 1000) + 3600,
            iss: "https://auth.demo-app.com",
            aud: "https://api.demo-app.com",
            scope: "read write profile",
            roles: ["user", "developer"]
        };

        const base64Header = btoa(JSON.stringify(header));
        const base64Payload = btoa(JSON.stringify(payload));
        const fakeSignature = btoa(Math.random().toString(36).repeat(10)).substr(0, 43);

        return `${base64Header}.${base64Payload}.${fakeSignature}`;
    }

    let currentToken = null;

    async function fakeAPICall(endpoint, token) {
        return fetch(`https://jsonplaceholder.typicode.com/users/1`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'X-Custom-Header': 'demo-app'
            }
        });
    }

    // Login form handler
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Authenticating...';

        currentToken = generateFakeJWT();

        await new Promise(resolve => setTimeout(resolve, 500));

        try {
            await fakeAPICall('/api/auth/login', currentToken);
        } catch (e) {
        }

        document.getElementById('user-email').textContent = document.getElementById('email').value;

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';

        btn.disabled = false;
        btn.innerHTML = 'Sign In';
    });

    document.getElementById('refresh-btn').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Loading...';

        try {
            await fakeAPICall('/api/dashboard/data', currentToken);
        } catch (e) {
        }

        await new Promise(resolve => setTimeout(resolve, 500));

        btn.disabled = false;
        btn.innerHTML = '🔄 Refresh Data (Triggers API Call)';
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
        currentToken = null;
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('dashboard-section').style.display = 'none';
    });
</script>
</body>
</html>
